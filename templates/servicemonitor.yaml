{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "fortigate-exporter.fullname" . }}
  labels:
    {{- include "fortigate-exporter.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "fortigate-exporter.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      path: /probe
      params:
        target:
          - {{ required "serviceMonitor.targetUrl is required" .Values.serviceMonitor.targetUrl }}
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
      relabelings:
        - sourceLabels: [__param_target]
          regex: (?:https?://)?([^:/]+).*
          targetLabel: instance
          replacement: $1
{{- end }}